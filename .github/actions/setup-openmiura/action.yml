name: setup-openmiura
description: Set up Python, install dependencies and local package

inputs:
  python-version:
    description: Python version
    required: false
    default: "3.11"
  extras:
    description: Optional extras group to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Upgrade pip
      shell: bash
      run: |
        python -m pip install --upgrade pip

    - name: Install base dependencies
      shell: bash
      run: |
        if [ -f requirements.txt ]; then
          python -m pip install -r requirements.txt
        fi

    - name: Install local package
      shell: bash
      env:
        EXTRAS: ${{ inputs.extras }}
      run: |
        if [ -n "${EXTRAS}" ]; then
          python -m pip install -e ".[${EXTRAS}]"
        else
          python -m pip install -e .
        fi

    - name: Smoke check local package import
      shell: bash
      run: |
        python -c "import importlib; importlib.import_module('openmiura')"
