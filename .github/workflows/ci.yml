name: CI

'on':
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: ${{ matrix.python-version }}

      - name: Doctor
        shell: bash
        run: |
          python -m openmiura doctor --config configs/openmiura.yaml

      - name: Collect tests
        shell: bash
        run: |
          python -m pytest --collect-only -q

      - name: Run tests
        shell: bash
        run: |
          python -m pytest -q

  reproducible-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: "3.11"

      - name: Build release artifacts
        shell: bash
        run: |
          python scripts/build_release_artifacts.py

      - name: Verify release artifacts
        shell: bash
        run: |
          python scripts/verify_release_artifacts.py