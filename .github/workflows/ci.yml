name: CI

'on':
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: ${{ matrix.python-version }}
          extras: dev

      - name: Doctor
        shell: bash
        run: |
          python -m openmiura doctor --config configs/openmiura.yaml

      - name: Collect tests
        shell: bash
        run: |
          python -m pytest --collect-only -q

      - name: Run tests
        shell: bash
        run: |
          python -m pytest -q

  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: "3.11"
          extras: dev

      - name: Run release quality gate
        shell: bash
        run: |
          python scripts/run_release_quality_gate.py --include-extended --output-dir reports/quality_gate

      - name: Upload quality gate reports
        uses: actions/upload-artifact@v7
        with:
          name: openmiura-quality-gate
          path: reports/quality_gate/**

  reproducible-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: "3.11"
          extras: dev

      - name: Build release artifacts
        shell: bash
        run: |
          python scripts/build_release_artifacts.py --dist-dir dist --tag v-ci --target desktop --strict

      - name: Verify release artifacts
        shell: bash
        run: |
          python scripts/verify_release_artifacts.py --dist-dir dist
