name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Compile Python sources
        run: |
          python -m compileall -q app.py openmiura tests

      - name: Check frontend syntax
        run: |
          node --check openmiura/ui/static/app.js

      - name: Run doctor
        run: |
          python -m openmiura doctor --config configs/openmiura.yaml

      - name: Collect tests
        run: |
          pytest --collect-only -q

      - name: Run test suite
        run: |
          pytest -q

  package-smoke:
    name: Package smoke
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl --no-deps
          openmiura version

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  reproducible-package:
    name: Reproducible package
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          python -m pip check

      - name: Build deterministic package
        run: |
          python scripts/reproducible_package.py \
            --target desktop \
            --label "CI reproducible build" \
            --version "${GITHUB_SHA::12}" \
            --output-dir dist

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openmiura-reproducible-package
          path: |
            dist/*.zip
            dist/*.manifest.json
          if-no-files-found: error

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: |
          docker build -t openmiura:ci .
