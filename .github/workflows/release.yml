name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to publish (example: v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Publish as prerelease'
        required: false
        default: false
        type: boolean
      target:
        description: 'Packaging target'
        required: false
        default: 'desktop'
        type: choice
        options:
          - desktop
          - mobile
      notes:
        description: 'Optional release notes header'
        required: false
        default: ''
        type: string

concurrency:
  group: release-${{ github.ref || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      target: ${{ steps.meta.outputs.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE=false
            TARGET=desktop
          else
            TAG="${{ inputs.tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
            TARGET="${{ inputs.target }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null

      - name: Resolve deterministic build timestamp
        id: epoch
        shell: bash
        run: |
          set -euo pipefail
          echo "source_date_epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: '3.11'
          extras: dev
          install-requirements: 'true'
          pip-check: 'true'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install release-only build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install build twine

      - name: Fast validation before release
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q app.py openmiura tests
          node --check openmiura/ui/static/app.js
          pytest -q

      - name: Build Python distributions
        shell: bash
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.source_date_epoch }}
        run: |
          set -euo pipefail
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Build reproducible package
        shell: bash
        run: |
          set -euo pipefail
          python scripts/reproducible_package.py \
            --target "${{ steps.meta.outputs.target }}" \
            --label "GitHub Release ${{ steps.meta.outputs.tag }}" \
            --version "${{ steps.meta.outputs.version }}" \
            --output-dir dist

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            if [[ -n "${{ inputs.notes || '' }}" ]]; then
              printf '%s\n\n' "${{ inputs.notes || '' }}"
            fi
            printf 'Release artifact summary for `%s`.\n\n' "${{ steps.meta.outputs.tag }}"
            printf '- Python distributions: sdist + wheel\n'
            printf '- Reproducible package: %s\n' "${{ steps.meta.outputs.target }}"
            printf '- Checksums: SHA256SUMS.txt\n'
          } > dist/RELEASE_NOTES.md

      - name: Generate release manifest and checksums
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_release_artifacts.py             --dist-dir dist             --tag "${{ steps.meta.outputs.tag }}"             --target "${{ steps.meta.outputs.target }}"             --strict

      - name: Verify release artifact integrity
        shell: bash
        run: |
          set -euo pipefail
          python scripts/verify_release_artifacts.py --dist-dir dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmiura-release-${{ steps.meta.outputs.tag }}
          path: |
            dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    environment: production
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: openmiura-release-${{ needs.build-release.outputs.tag }}
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.build-release.outputs.tag }}"
          TITLE="openMiura ${TAG}"
          EXTRA_ARGS=()
          if [[ "${{ needs.build-release.outputs.prerelease }}" == "true" ]]; then
            EXTRA_ARGS+=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "$TITLE" \
              --notes-file dist/RELEASE_NOTES.md \
              "${EXTRA_ARGS[@]}"
          fi
