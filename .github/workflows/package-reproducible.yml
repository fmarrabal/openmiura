name: package-reproducible

'on':
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/package-reproducible.yml"
      - ".github/actions/setup-openmiura/action.yml"
      - "scripts/reproducible_package.py"
      - "scripts/build_release_artifacts.py"
      - "scripts/verify_release_artifacts.py"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "requirements.txt"
      - "openmiura/**"
      - "packaging/**"
      - "configs/**"
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/package-reproducible.yml"
      - ".github/actions/setup-openmiura/action.yml"
      - "scripts/reproducible_package.py"
      - "scripts/build_release_artifacts.py"
      - "scripts/verify_release_artifacts.py"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "requirements.txt"
      - "openmiura/**"
      - "packaging/**"
      - "configs/**"
      - "docs/**"

jobs:
  reproducible-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: "3.11"
          extras: dev

      - name: Build deterministic package
        shell: bash
        env:
          SOURCE_DATE_EPOCH: '1577836800'
        run: |
          python scripts/reproducible_package.py

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmiura-release-artifacts
          path: dist/**
