name: package-reproducible

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  reproducible-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python and install local package
        uses: ./.github/actions/setup-openmiura
        with:
          python-version: '3.11'
          extras: dev
          install-requirements: 'true'
          pip-check: 'true'

      - name: Build deterministic package
        shell: bash
        env:
          SOURCE_DATE_EPOCH: '1577836800'
        run: |
          set -euo pipefail
          python scripts/reproducible_package.py             --target desktop             --label "CI reproducible build"             --version "${GITHUB_SHA::12}"             --output-dir dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openmiura-reproducible-package
          path: |
            dist/*.zip
            dist/*.manifest.json
          if-no-files-found: error
