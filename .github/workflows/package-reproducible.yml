name: package-reproducible

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  reproducible-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build deterministic package
        run: |
          python scripts/reproducible_package.py --target desktop --label "CI reproducible build" --version "${GITHUB_SHA::12}" --output-dir dist
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmiura-reproducible-package
          path: |
            dist/*.zip
            dist/*.manifest.json
