name: security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-openmiura
        with:
          python-version: "3.11"
      - run: python -m pip install pip-audit
      - run: pip-audit

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2