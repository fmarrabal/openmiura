services:
  openmiura:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmiura:local
    container_name: openmiura-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENMIURA_CONFIG: ${OPENMIURA_CONFIG:-configs/openmiura.yaml}
      OPENMIURA_SERVER_HOST: ${OPENMIURA_SERVER_HOST:-0.0.0.0}
      OPENMIURA_SERVER_PORT: ${OPENMIURA_SERVER_PORT:-8081}
      OPENMIURA_BROKER_ENABLED: ${OPENMIURA_BROKER_ENABLED:-true}
      OPENMIURA_AUTH_ENABLED: ${OPENMIURA_AUTH_ENABLED:-true}
      OPENMIURA_DB_PATH: ${OPENMIURA_DB_PATH:-data/audit.db}
      OPENMIURA_SANDBOX_DIR: ${OPENMIURA_SANDBOX_DIR:-data/sandbox}
      OPENMIURA_LLM_PROVIDER: ${OPENMIURA_LLM_PROVIDER:-ollama}
      OPENMIURA_LLM_BASE_URL: ${OPENMIURA_LLM_BASE_URL:-http://host.docker.internal:11434}
      OPENMIURA_LLM_MODEL: ${OPENMIURA_LLM_MODEL:-qwen2.5:7b-instruct}
      OPENMIURA_EMBED_BASE_URL: ${OPENMIURA_EMBED_BASE_URL:-http://host.docker.internal:11434}
      OPENMIURA_EMBED_MODEL: ${OPENMIURA_EMBED_MODEL:-nomic-embed-text}
      OPENMIURA_WITH_WORKERS: ${OPENMIURA_WITH_WORKERS:-false}
    ports:
      - "${OPENMIURA_SERVER_PORT:-8081}:8081"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
      - ./skills:/app/skills:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; import os; urlopen(f'http://127.0.0.1:{os.environ.get(\"OPENMIURA_SERVER_PORT\", \"8081\")}/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openmiura-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmiura:local
    container_name: openmiura-mcp
    profiles: ["mcp-standalone"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENMIURA_CONFIG: ${OPENMIURA_CONFIG:-configs/openmiura.yaml}
      OPENMIURA_MCP_ENABLED: ${OPENMIURA_MCP_ENABLED:-true}
      OPENMIURA_MCP_HOST: ${OPENMIURA_MCP_HOST:-0.0.0.0}
      OPENMIURA_MCP_PORT: ${OPENMIURA_MCP_PORT:-8091}
      OPENMIURA_MCP_SSE_PATH: ${OPENMIURA_MCP_SSE_PATH:-/mcp}
    command: ["openmiura", "mcp", "sse", "--config", "configs/openmiura.yaml"]
    ports:
      - "${OPENMIURA_MCP_PORT:-8091}:8091"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
      - ./skills:/app/skills:ro

  ollama:
    image: ollama/ollama:latest
    container_name: openmiura-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  prometheus:
    image: prom/prometheus:latest
    container_name: openmiura-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - openmiura

  alertmanager:
    image: prom/alertmanager:latest
    container_name: openmiura-alertmanager
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      OPENMIURA_ALERT_WEBHOOK_URL: ${OPENMIURA_ALERT_WEBHOOK_URL:-}
      OPENMIURA_ALERT_WEBHOOK_HTTP_CONFIG_BEARER_TOKEN: ${OPENMIURA_ALERT_WEBHOOK_HTTP_CONFIG_BEARER_TOKEN:-}
      OPENMIURA_ALERT_SLACK_WEBHOOK_URL: ${OPENMIURA_ALERT_SLACK_WEBHOOK_URL:-}
      OPENMIURA_ALERT_SLACK_CHANNEL: ${OPENMIURA_ALERT_SLACK_CHANNEL:-#openmiura-alerts}
      OPENMIURA_ALERT_EMAIL_TO: ${OPENMIURA_ALERT_EMAIL_TO:-}
      OPENMIURA_ALERT_EMAIL_FROM: ${OPENMIURA_ALERT_EMAIL_FROM:-}
      OPENMIURA_ALERT_EMAIL_SMARTHOST: ${OPENMIURA_ALERT_EMAIL_SMARTHOST:-}
      OPENMIURA_ALERT_EMAIL_AUTH_USERNAME: ${OPENMIURA_ALERT_EMAIL_AUTH_USERNAME:-}
      OPENMIURA_ALERT_EMAIL_AUTH_PASSWORD: ${OPENMIURA_ALERT_EMAIL_AUTH_PASSWORD:-}
      OPENMIURA_ALERT_EMAIL_REQUIRE_TLS: ${OPENMIURA_ALERT_EMAIL_REQUIRE_TLS:-true}
    entrypoint: ["/bin/sh", "-c"]
    command: "/etc/alertmanager/render_alertmanager_config.sh /tmp/alertmanager.yml && exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./ops/alertmanager/render_alertmanager_config.sh:/etc/alertmanager/render_alertmanager_config.sh:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:latest
    container_name: openmiura-grafana
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - alertmanager

volumes:
  ollama:
  prometheus_data:
  grafana_data:
  alertmanager_data:
